openapi: 3.0.3
info:
  title: ToDo API
  description: 基本的なToDo操作を行うシンプルなWeb API
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: ローカル開発サーバー

tags:
  - name: todos
    description: ToDo操作

paths:
  /todos:
    get:
      tags:
        - todos
      summary: ToDo一覧取得
      description: 登録されている全てのToDoを取得します。
      operationId: listTodos
      parameters:
        - name: completed
          in: query
          description: 完了状態でフィルタリング
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Todo"

    post:
      tags:
        - todos
      summary: ToDo作成
      description: 新しいToDoを作成します。
      operationId: createTodo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TodoCreate"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /todos/{todo_id}:
    parameters:
      - name: todo_id
        in: path
        description: ToDoのID
        required: true
        schema:
          type: integer

    get:
      tags:
        - todos
      summary: ToDo取得
      description: 指定したIDのToDoを取得します。
      operationId: getTodo
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "404":
          description: 見つかりません
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - todos
      summary: ToDo更新
      description: 指定したIDのToDoを更新します。
      operationId: updateTodo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TodoUpdate"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "404":
          description: 見つかりません
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

    delete:
      tags:
        - todos
      summary: ToDo削除
      description: 指定したIDのToDoを削除します。
      operationId: deleteTodo
      responses:
        "204":
          description: 削除成功
        "404":
          description: 見つかりません
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Todo:
      type: object
      required:
        - id
        - title
        - completed
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          description: ToDoのID
          example: 1
        title:
          type: string
          description: ToDoのタイトル
          example: 買い物に行く
        description:
          type: string
          nullable: true
          description: ToDoの詳細
          example: 牛乳・卵・パンを買う
        completed:
          type: boolean
          description: 完了状態
          example: false
        created_at:
          type: string
          format: date-time
          description: 作成日時
          example: "2026-03-20T06:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: 更新日時
          example: "2026-03-20T06:00:00Z"

    TodoCreate:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          description: ToDoのタイトル
          minLength: 1
          maxLength: 255
          example: 買い物に行く
        description:
          type: string
          nullable: true
          description: ToDoの詳細
          maxLength: 1000
          example: 牛乳・卵・パンを買う

    TodoUpdate:
      type: object
      properties:
        title:
          type: string
          description: ToDoのタイトル
          minLength: 1
          maxLength: 255
          example: 買い物に行く
        description:
          type: string
          nullable: true
          description: ToDoの詳細
          maxLength: 1000
          example: 牛乳・卵・パンを買う
        completed:
          type: boolean
          description: 完了状態
          example: true

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: エラーメッセージ
          example: 指定されたToDoが見つかりません

    ValidationError:
      type: object
      required:
        - message
        - details
      properties:
        message:
          type: string
          description: エラーメッセージ
          example: バリデーションエラー
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: title
              message:
                type: string
                example: タイトルは必須です
